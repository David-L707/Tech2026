<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="reg.css">
</head>
<body>

    <div>
        <h1 style="font-family: fantasy;text-align: center;">Register</h1>
    </div>
    <form id="tbl1">
        <table>
            <tr>
                <td>Name:</td>
            <td><input type="text"></td>
            </tr>
            <tr>
                <td>Email:</td>
            <td><input type="email"></td>
            </tr>
            <tr>
                <td>Ph.no:</td>
            <td><input type="tel" maxlength="10" pattern="[0-9]{10}"></td>
            </tr>
            <tr>
                <td>Role:</td>
            <td><select >
                <option >Student</option>
                <option >Proffesional</option>
            </select></td>
            </tr>
        </table>
    </form>

</body>
</html>
